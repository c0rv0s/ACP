[profile.default]
src = "src"
out = "out"
libs = ["node_modules", "lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read-write", path = "./" }]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "params_first"

[rpc_endpoints]
local = "http://127.0.0.1:8545"
